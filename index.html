<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      animation: fadeIn 2s ease-in;
    }

    /* ФОН */
    .bg {
      max-width: 95vw;
      max-height: 95vh;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    /* ОБЁРТКА КРУГА */
    .circle-wrapper {
      position: absolute;
      top: 20px;
      left: 50px;
      width: 50%;
    }

    /* ВРАЩЕНИЕ */
    .circle-spin {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin 12s linear infinite;
      transform-origin: center center;
      will-change: transform;
    }

    .circle-spin img {
      width: 100%;
      display: block;
      pointer-events: none;
      filter: drop-shadow(0 0 10px white);
    }

    /* АВАТАРКА (НЕ ВРАЩАЕТСЯ) */
    .avatar-container {
      position: absolute;
      top: 50%;
      left: 30%; /* подогнано под твой круг */
      transform: translate(-50%, -50%);
      width: 20%;
      aspect-ratio: 1 / 1;
      z-index: 2;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 13px 89px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      border-radius: 0px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 15px;
      z-index: 1;
    }

    .btn:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.1);
      border-color: white;
    }

    .btn.active {
      transform: scale(1.05);
      z-index: 10;
      background: rgba(0,0,0,0.85);
      border-color: white;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ФОН -->
    <img src="design2.png" class="bg" draggable="false">

    <!-- КРУГ -->
    <div class="circle-wrapper">
      <div class="circle-spin">
        <img src="circle2.png">
      </div>

      <!-- АВАТАРКА -->
      <div class="avatar-container">
        <img src="avatar.png" class="avatar" id="avatar">
      </div>
    </div>

    <!-- КНОПКИ -->
    <button class="btn fade" style="top:80.955%; left:5.5%;"
      onclick="window.location.href='upload.html'">
      Upload Track
    </button>

    <button class="btn fade" style="top:80.955%; left:35%; animation-delay:0.2s;"
      onclick="window.location.href='explore.html'">
      Explore Sound
    </button>

    <button class="btn fade" style="top:80.955%; left:65.35%; animation-delay:0.4s;"
      onclick="window.location.href='how.html'">
      How It Works
    </button>

    <!-- ЗАГРУЗКА АВАТАРКИ (можешь убрать потом) -->
    <input type="file" id="uploadAvatar" style="position:absolute; top:10px; left:10px; z-index:10;">

  </div>

  <script>
    const buttons = document.querySelectorAll('.btn');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // загрузка аватарки
    const upload = document.getElementById('uploadAvatar');
    const avatar = document.getElementById('avatar');

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        avatar.src = URL.createObjectURL(file);
      }
    });
  </script>

</body>
</html>
