<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      animation: fadeIn 2s ease-in;
    }

    /* ФОН */
    .bg {
      width: 100%;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    /* КРУГ */
    .circle {
      position: absolute;
      top: 12%;
      left: 12%;
      width: 180px;
      animation: spin 12s linear infinite;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 15px 25px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 16px;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #1db954;
      border-color: #1db954;
    }

    /* ПЛАВНОЕ ПОЯВЛЕНИЕ */
    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ФОН -->
    <img src="design.png" class="bg" draggable="false">

    <!-- КРУГ (ОТДЕЛЬНЫЙ PNG) -->
    <img src="circle.png" class="circle">

    <!-- КНОПКИ -->
    <button class="btn fade" style="top:72%; left:28%;">
      Upload Track
    </button>

    <button class="btn fade" style="top:72%; left:43%; animation-delay:0.2s;">
      Explore Sound
    </button>

    <button class="btn fade" style="top:72%; left:58%; animation-delay:0.4s;">
      How It Works
    </button>

  </div>

</body>
</html>
