<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* ОБЁРТКА */
    .container {
      position: relative;
      width: 100%;
    }

    /* КАРТИНКА */
    .bg {
      width: 100%;
      display: block;
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 15px 25px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 16px;
    }

    /* HOVER */
    .btn:hover {
      transform: scale(1.1);
      background: #1db954;
      border-color: #1db954;
    }

    /* АНИМАЦИЯ ПОЯВЛЕНИЯ */
    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ПЛАВАЮЩАЯ АНИМАЦИЯ */
    .float {
      animation: float 3s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-10px); }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ТВОЙ ДИЗАЙН -->
    <img src="design.jpg" class="bg">

    <!-- КНОПКИ -->
    <button class="btn fade float" style="top:72%; left:28%;">
      Upload Track
    </button>

    <button class="btn fade float" style="top:72%; left:43%; animation-delay:0.2s;">
      Explore Sound
    </button>

    <button class="btn fade float" style="top:72%; left:58%; animation-delay:0.4s;">
      How It Works
    </button>

  </div>

</body>
</html>
