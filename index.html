<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      animation: fadeIn 2s ease-in;
    }

    .bg {
      max-width: 95vw;
      max-height: 95vh;
      display: block;
      pointer-events: none;
    }

    /* ОБЩИЙ БЛОК КРУГА */
    .circle-wrapper {
      position: absolute;
      top: 20px;
      left: 50px;
      width: 50%;
    }

    /* ВРАЩЕНИЕ */
    .circle-spin {
      width: 60%;
      animation: spin 12s linear infinite;
    }

    .circle-spin img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 0 10px white);
    }

    /* ЦЕНТР (АВАТАР + КНОПКА) */
    .center-box {
      position: absolute;
      top: 50%;
      left: 30%; /* подгон под твой круг */
      transform: translate(-50%, -50%);
      width: 18%;
      aspect-ratio: 1/1;
      border-radius: 50%;
      overflow: hidden;
      z-index: 3;
    }

    /* АВАТАРКА */
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* КНОПКА "+" */
    .upload-btn {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px dashed white;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 40px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.3s;
    }

    .upload-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.1);
    }

    input[type="file"] {
      display: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 13px 89px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 15px;
      z-index: 1;
    }

    .btn:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.1);
      border-color: white;
    }

    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="design2.png" class="bg">

    <!-- КРУГ -->
    <div class="circle-wrapper">

      <div class="circle-spin">
        <img src="circle2.png">
      </div>

      <!-- ЦЕНТР -->
      <div class="center-box">

        <!-- АВАТАР -->
        <div class="avatar">
          <img id="avatarImg">
        </div>

        <!-- КНОПКА "+" -->
        <label class="upload-btn" id="uploadBtn">
          +
          <input type="file" id="uploadAvatar" accept="image/*">
        </label>

      </div>

    </div>

    <!-- КНОПКИ -->
    <button class="btn fade" style="top:80.955%; left:5.5%;">
      Upload Track
    </button>

    <button class="btn fade" style="top:80.955%; left:35%; animation-delay:0.2s;">
      Explore Sound
    </button>

    <button class="btn fade" style="top:80.955%; left:65.35%; animation-delay:0.4s;">
      How It Works
    </button>

  </div>

  <script>
    const upload = document.getElementById('uploadAvatar');
    const avatar = document.getElementById('avatarImg');
    const btn = document.getElementById('uploadBtn');

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        avatar.src = URL.createObjectURL(file);
        avatar.style.display = 'block';
        btn.style.display = 'none'; // скрываем "+"
      }
    });
  </script>

</body>
</html>
