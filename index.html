<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      animation: fadeIn 2s ease-in;
    }

    /* ФОН */
    .bg {
      max-width: 95vw;   /* 🔥 адаптив */
      max-height: 95vh;
      display: block;
      pointer-events: none;
      user-select: none;
    }
/* КРУГ */
.circle {
  position: absolute;
  top: 21px;
  left: 21px;

  width: 800px; /* фикс размер */
  

  animation: spin 12s linear infinite;
  pointer-events: none;
  filter: drop-shadow(0 0 10px white);

  transform-origin: center;
}

/* АНИМАЦИЯ ВНЕ КЛАССА */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 14px 26px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 15px;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #1db954;
      border-color: #1db954;
    }

    /* АНИМАЦИЯ */
    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ФОН -->
    <img src="design.png" class="bg" draggable="false">

    <!-- КРУГ -->
    <img src="circle.png" class="circle">

    <!-- КНОПКИ -->
    <button class="btn fade" style="top:72%; left:28%;">
      Upload Track
    </button>

    <button class="btn fade" style="top:72%; left:45%; animation-delay:0.2s;">
      Explore Sound
    </button>

    <button class="btn fade" style="top:72%; left:62%; animation-delay:0.4s;">
      How It Works
    </button>

  </div>

</body>
</html>
