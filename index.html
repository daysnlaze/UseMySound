<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      animation: fadeIn 2s ease-in;
    }

    /* ФОН */
    .bg {
      max-width: 95vw;
      max-height: 95vh;
      display: block;
      pointer-events: none;
    }

    /* КРУГ */
    .circle-wrapper {
      position: absolute;
      top: 20px;
      left: 50px;
      width: 50%;
    }

    .circle-spin {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin 12s linear infinite;
    }

    .circle-spin img {
      width: 100%;
      filter: drop-shadow(0 0 10px white);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* АВАТАРКА */
    .avatar-container {
      position: absolute;
      top: 50%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 38%;
      aspect-ratio: 1 / 1;
      z-index: 2;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.9);
      box-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(255,255,255,0.25);
    }

    /* ПЛЮС */
    .add-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 35%;
      height: 35%;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 1px solid #666;
      color: white;
      font-size: 30px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.3s;
    }

    .add-btn:hover {
      transform: translate(-50%, -50%) scale(1.1);
      border-color: white;
    }

    .hidden {
      display: none;
    }

    #uploadAvatar {
      display: none;
    }

    /* НИКНЕЙМ */
    .nickname {
      position: absolute;
      top: 45%;
      left: 75%;
      transform: translateY(-50%);
      font-size: 42px;
      color: white;
      cursor: pointer;

      text-shadow:
        0 0 5px rgba(255,255,255,0.9),
        0 0 10px rgba(255,255,255,0.7),
        0 0 20px rgba(255,255,255,0.4);
    }

    .nickname:hover {
      opacity: 0.8;
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 13px 89px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      cursor: pointer;
      transition: 0.3s;
      font-size: 15px;
    }

    .btn:hover {
      transform: scale(1.1);
      border-color: white;
    }

    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="design2.png" class="bg">

    <div class="circle-wrapper">
      <div class="circle-spin">
        <img src="circle2.png">
      </div>

      <div class="avatar-container">
        <img src="avatar.png" class="avatar" id="avatar">

        <div class="add-btn" id="addBtn" onclick="uploadAvatar.click()">
          +
        </div>
      </div>
    </div>

    <!-- НИК -->
    <div class="nickname" id="nickname">
      YOUR NAME
    </div>

    <input type="file" id="uploadAvatar">

    <button class="btn fade" style="top:80.955%; left:5.5%;"
      onclick="window.location.href='upload.html'">
      Upload Track
    </button>

    <button class="btn fade" style="top:80.955%; left:35%; animation-delay:0.2s;"
      onclick="window.location.href='explore.html'">
      Explore Sound
    </button>

    <button class="btn fade" style="top:80.955%; left:65.35%; animation-delay:0.4s;"
      onclick="window.location.href='how.html'">
      How It Works
    </button>

  </div>

  <script>
    const avatar = document.getElementById('avatar');
    const uploadAvatar = document.getElementById('uploadAvatar');
    const addBtn = document.getElementById('addBtn');
    const nickname = document.getElementById('nickname');

    // загрузка аватарки
    uploadAvatar.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        avatar.src = URL.createObjectURL(file);
        addBtn.classList.add('hidden');
        localStorage.setItem('avatar', avatar.src);
      }
    });

    // загрузка при старте
    const savedAvatar = localStorage.getItem('avatar');
    if (savedAvatar) {
      avatar.src = savedAvatar;
      addBtn.classList.add('hidden');
    }

    // ник
    const savedName = localStorage.getItem('nickname');
    if (savedName) {
      nickname.textContent = savedName;
    }

    nickname.addEventListener('click', () => {
      const name = prompt("Enter your nickname:");
      if (name && name.trim() !== "") {
        nickname.textContent = name;
        localStorage.setItem('nickname', name);
      }
    });
  </script>

</body>
</html>
