<!DOCTYPE html>
<html>
<head>
  <title>UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      animation: fadeIn 2s ease-in;
    }

    /* ФОН */
    .bg {
      max-width: 95vw;
      max-height: 95vh;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    /* ОБЁРТКА (ТВОИ РАЗМЕРЫ НЕ ТРОГАЕМ) */
    .circle-wrapper {
      position: absolute;
      top: -300px;
      left: 5px;
      width: 50%;
    }

    /* КОНТЕЙНЕР ДЛЯ ВРАЩЕНИЯ */
    .circle-spin {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;

      animation: spin 12s linear infinite;
      transform-origin: center center;
      will-change: transform;
    }

    /* САМА КАРТИНКА */
    .circle-spin img {
      width: 100%;
      display: block; /* убирает смещение */
      pointer-events: none;
      filter: drop-shadow(0 0 10px white);
    }

    /* АНИМАЦИЯ */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* КНОПКИ */
    .btn {
      position: absolute;
      padding: 25px 100px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(6px);
      font-size: 15px;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #1db954;
      border-color: #1db954;
    }

    /* ПЛАВНОЕ ПОЯВЛЕНИЕ */
    .fade {
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ФОН -->
    <img src="design2.png" class="bg" draggable="false">

    <!-- КРУГ (ТЕКСТ КРУТИТСЯ ИДЕАЛЬНО) -->
    <div class="circle-wrapper">
      <div class="circle-spin">
        <img src="circle2.png">
      </div>
    </div>

    <!-- КНОПКИ -->
    <button class="btn fade" style="top:72%; left:28%;">
      Upload Track
    </button>

    <button class="btn fade" style="top:72%; left:45%; animation-delay:0.2s;">
      Explore Sound
    </button>

    <button class="btn fade" style="top:72%; left:62%; animation-delay:0.4s;">
      How It Works
    </button>

  </div>

</body>
</html>
