<!DOCTYPE html>
<html>
<head>
  <title>Upload - UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .container {
      position: relative;
    }

    .circle {
      position: relative;
      width: 130vw;
      height: 130vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle img {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
    }

    .circle-xl {
      width: 110%;
      animation: spin1 40s linear infinite;
      opacity: 0.4;
    }

    .circle-big {
      width: 80%;
      animation: spin2 25s linear infinite;
      opacity: 0.6;
    }

    @keyframes spin1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .content {
      position: relative;
      width: 420px;
      text-align: center;
      z-index: 5;
    }

    /* BACK КНОПКА (отдельно от заголовка) */
    .back-btn {
      position: absolute;
      top: 0;
      left: -80px;

      padding: 8px 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-btn:hover {
      border-color: white;
      transform: scale(1.05);
    }

    /* ТВОЙ ЦЕНТРАЛЬНЫЙ ЗАГОЛОВОК НЕ ТРОГАЕМ */
    h1 {
      margin: 0;
      font-size: 20px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #444;
      color: white;
    }

    textarea {
      height: 70px;
    }

    .tags-container {
      position: relative;
    }

    .suggestions {
      position: absolute;
      width: 100%;
      background: black;
      border: 1px solid #444;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: rgba(255,255,255,0.1);
    }

    .selected-tags span {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .all-tags {
      margin-top: 10px;
      max-height: 90px;
      overflow-y: auto;
      position: relative;

      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent,
        white 15%,
        white 85%,
        transparent
      );
      mask-image: linear-gradient(
        to bottom,
        transparent,
        white 15%,
        white 85%,
        transparent
      );
    }

    .all-tags span {
      display: inline-block;
      border: 1px solid #444;
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn {
      margin-top: 10px;
      padding: 12px 40px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="circle">
    <img src="circle2.png" class="circle-xl">
    <img src="circle2.png" class="circle-big">

    <div class="content">

      <!-- BACK КНОПКА (НЕ ТРОГАЕТ ЦЕНТР) -->
      <button class="back-btn" onclick="location.href='index.html'">← Back</button>

      <!-- ЦЕНТР НЕ ТРОГАЕМ -->
      <h1>Upload Track</h1>

      <input type="text" placeholder="Track Title">
      <textarea placeholder="Track Description"></textarea>
      <input type="file" accept=".mp3,.wav,.ogg,audio/*">

      <select>
        <option>License Type</option>
        <option>Exclusive</option>
        <option>Non-exclusive</option>
        <option>Rent</option>
      </select>

      <input type="number" placeholder="Price ($)">

      <div class="tags-container">
        <input type="text" id="tagInput" placeholder="Add tags...">
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="selected-tags" id="selectedTags"></div>

      <div class="all-tags" id="allTags"></div>

      <button class="btn">Upload</button>

    </div>
  </div>
</div>

<script>
const tagList = [
"sad","happy","dark","emotional","aggressive","melancholic","romantic","angry","lonely","nostalgic",
"chill","relax","calm","energetic","uplifting","smooth","soft","hard","heavy","dreamy",
"slow","fast","groovy","bouncy","ambient","background",
"trap","drill","lofi","hiphop","house","techno","edm","pop","rock","jazz","funk","rnb","phonk",
"piano","guitar","violin","synth","bass","drums","808",
"cinematic","epic","soundtrack","anime","game",
"night","summer","rain","city","club","party",
"vocal","instrumental","loop","beat",
"rage","hyperpop","afrobeats","latin","kpop"
];

let selected = [];

const input = document.getElementById('tagInput');
const suggestions = document.getElementById('suggestions');
const selectedDiv = document.getElementById('selectedTags');
const allTagsDiv = document.getElementById('allTags');

tagList.forEach(tag => {
  const el = document.createElement('span');
  el.innerText = tag;
  el.onclick = () => addTag(tag);
  allTagsDiv.appendChild(el);
});

input.addEventListener('input', () => {
  const value = input.value.toLowerCase();
  suggestions.innerHTML = '';

  if (!value) {
    suggestions.style.display = 'none';
    return;
  }

  tagList.filter(tag => tag.includes(value)).forEach(tag => {
    const div = document.createElement('div');
    div.innerText = tag;
    div.onclick = () => addTag(tag);
    suggestions.appendChild(div);
  });

  suggestions.style.display = 'block';
});

function addTag(tag) {
  if (!selected.includes(tag)) {
    selected.push(tag);
    renderTags();
  }
}

function removeTag(tag) {
  selected = selected.filter(t => t !== tag);
  renderTags();
}

function renderTags() {
  selectedDiv.innerHTML = '';
  selected.forEach(tag => {
    const el = document.createElement('span');
    el.innerText = tag + " ✕";
    el.onclick = () => removeTag(tag);
    selectedDiv.appendChild(el);
  });
}
</script>

</body>
</html>
