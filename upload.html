<!DOCTYPE html>
<html>
<head>
  <title>Upload - UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .container {
      position: relative;
    }

    .circle {
      position: relative;
      width: 130vw;
      height: 130vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle img {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
    }

    .circle-xl {
      width: 110%;
      animation: spin1 40s linear infinite;
      opacity: 0.4;
    }

    .circle-big {
      width: 80%;
      animation: spin2 25s linear infinite;
      opacity: 0.6;
    }

    @keyframes spin1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .content {
      position: relative;
      width: 480px;
      text-align: center;
      z-index: 5;
    }

    .back-btn {
      position: absolute;
      top: -60px;
      left: 0;
      padding: 8px 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #444;
      color: white;
    }

    textarea {
      height: 70px;
    }

    /* ТЕГИ */
    .tags-row {
      display: flex;
      gap: 10px;
    }

    .tags-left {
      width: 65%;
      position: relative;
    }

    .tags-right {
      width: 35%;
      max-height: 180px;
      overflow-y: auto;
    }

    .tags-right span {
      display: inline-block;
      border: 1px solid #444;
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .tags-right span:hover {
      border-color: white;
    }

    .suggestions {
      position: absolute;
      width: 100%;
      background: black;
      border: 1px solid #444;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: rgba(255,255,255,0.1);
    }

    .selected-tags span {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn {
      padding: 12px 40px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="circle">
    <img src="circle2.png" class="circle-xl">
    <img src="circle2.png" class="circle-big">

    <div class="content">

      <button class="back-btn" onclick="location.href='index.html'">← Back</button>

      <h1>Upload Track</h1>

      <input type="text" id="title" placeholder="Track Title">
      <textarea id="description" placeholder="Track Description"></textarea>
      <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,audio/*">

      <select>
        <option>License Type</option>
        <option>Exclusive</option>
        <option>Non-exclusive</option>
        <option>Rent</option>
      </select>

      <input type="number" placeholder="Price ($)">

      <!-- ТЕГИ -->
      <div class="tags-row">

        <div class="tags-left">
          <input type="text" id="tagInput" placeholder="Add tags...">
          <div class="suggestions" id="suggestions"></div>
          <div class="selected-tags" id="selectedTags"></div>
        </div>

        <div class="tags-right" id="popularTags"></div>

      </div>

      <button class="btn">Upload</button>

    </div>
  </div>
</div>

<script>
const tagList = [
"sad","happy","dark","emotional","aggressive","melancholic","romantic","angry","lonely","hope","fear","nostalgic","sadness",
"chill","relax","calm","energetic","uplifting","smooth","soft","hard","heavy","dreamy","spacey","vibe","mood",
"slow","fast","midtempo","groovy","bouncy","ambient","background","loop","flow","swing",
"trap","drill","lofi","hiphop","boom bap","house","techno","edm","pop","rock","jazz","funk","rnb","phonk","garage","dubstep","dnb",
"piano","guitar","violin","synth","bass","drums","808","strings","keys","pad","lead","pluck",
"cinematic","epic","soundtrack","movie","game","anime","intro","outro","trailer",
"night","day","summer","winter","rain","city","club","party","sunset","sunrise",
"vocal","instrumental","beat","mix","master","demo","sample",
"uk drill","jersey club","rage","pluggnb","hyperpop","afrobeats","latin","kpop","jpop",
"dark trap","sad piano","sad guitar","emotional piano","ambient pad","space ambient",
"club banger","hard bass","soft melody","clean mix","lofi chill","study music",
"focus","sleep","meditation","deep","atmospheric","underground","mainstream"
];

let selected = [];

const input = document.getElementById('tagInput');
const suggestions = document.getElementById('suggestions');
const selectedDiv = document.getElementById('selectedTags');
const popularDiv = document.getElementById('popularTags');

tagList.forEach(tag => {
  const el = document.createElement('span');
  el.innerText = tag;
  el.onclick = () => addTag(tag);
  popularDiv.appendChild(el);
});

input.addEventListener('input', () => {
  const value = input.value.toLowerCase();
  suggestions.innerHTML = '';

  if (!value) {
    suggestions.style.display = 'none';
    return;
  }

  const filtered = tagList.filter(tag => tag.includes(value));

  filtered.forEach(tag => {
    const div = document.createElement('div');
    div.innerText = tag;
    div.onclick = () => addTag(tag);
    suggestions.appendChild(div);
  });

  suggestions.style.display = 'block';
});

function addTag(tag) {
  if (!selected.includes(tag)) {
    selected.push(tag);
    renderTags();
  }
}

function removeTag(tag) {
  selected = selected.filter(t => t !== tag);
  renderTags();
}

function renderTags() {
  selectedDiv.innerHTML = '';
  selected.forEach(tag => {
    const el = document.createElement('span');
    el.innerText = tag + " ✕";
    el.onclick = () => removeTag(tag);
    selectedDiv.appendChild(el);
  });
}
</script>

</body>
</html>
