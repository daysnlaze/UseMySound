<!DOCTYPE html>
<html>
<head>
  <title>Upload - UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      position: relative;
      width: 130vw;
      height: 130vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle img {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
    }

    .circle-xl {
      width: 110%;
      animation: spin1 40s linear infinite;
      opacity: 0.4;
    }

    .circle-big {
      width: 80%;
      animation: spin2 25s linear infinite;
      opacity: 0.6;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
    }

    @keyframes spin1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .content {
      position: relative;
      width: 400px;
      text-align: center;
      z-index: 5;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #444;
      color: white;
    }

    textarea {
      height: 80px;
    }

    .btn {
      padding: 12px 40px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid #444;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      border-color: white;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="container">
  <div class="circle">
    <img src="circle2.png" class="circle-xl">
    <img src="circle2.png" class="circle-big">

    <div class="content">
      <h1>Upload Track</h1>

      <input type="text" id="title" placeholder="Track Title">
      <textarea id="description" placeholder="Track Description"></textarea>
      <input type="file" id="fileInput" accept="audio/*">

      <button class="btn" onclick="upload()">Upload</button>
    </div>

  </div>
</div>

<script>
function upload() {
  const title = document.getElementById('title').value;
  const description = document.getElementById('description').value;
  const file = document.getElementById('fileInput').files[0];

  if (!file) {
    alert("Выбери файл");
    return;
  }

  // сохраняем текст
  localStorage.setItem('trackTitle', title);
  localStorage.setItem('trackDescription', description);

  // создаём ссылку на файл
  const fileURL = URL.createObjectURL(file);
  localStorage.setItem('trackAudio', fileURL);

  // переход
  window.location.href = 'track.html';
}
</script>

</body>
</html>
