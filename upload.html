<!DOCTYPE html>
<html>
<head>
  <title>Upload - UseMySound</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .container {
      position: relative;
    }

    .circle {
      position: relative;
      width: 130vw;
      height: 130vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle img {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
    }

    .circle-xl {
      width: 110%;
      animation: spin1 40s linear infinite;
      opacity: 0.4;
    }

    .circle-big {
      width: 80%;
      animation: spin2 25s linear infinite;
      opacity: 0.6;
    }

    @keyframes spin1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .content {
      position: relative;
      width: 420px;
      text-align: center;
      z-index: 5;
    }

    /* КНОПКА НАЗАД */
    .back-btn {
      position: absolute;
      top: -60px;
      left: 0;

      padding: 8px 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 13px;
    }

    .back-btn:hover {
      transform: scale(1.05);
      border-color: white;
      background: rgba(255,255,255,0.1);
    }

    h1 {
      margin-bottom: 15px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #444;
      color: white;
    }

    textarea {
      height: 70px;
    }

    .tags-container {
      position: relative;
    }

    .suggestions {
      position: absolute;
      width: 100%;
      background: black;
      border: 1px solid #444;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: rgba(255,255,255,0.1);
    }

    .selected-tags span {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .popular-tags span {
      display: inline-block;
      border: 1px solid #444;
      padding: 5px 10px;
      margin: 3px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn {
      padding: 12px 40px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #444;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      border-color: white;
      background: rgba(255,255,255,0.1);
    }

  </style>
</head>

<body>

<div class="container">
  <div class="circle">
    <img src="circle2.png" class="circle-xl">
    <img src="circle2.png" class="circle-big">

    <div class="content">

      <!-- КНОПКА НАЗАД -->
      <button class="back-btn" onclick="goHome()">← Back</button>

      <h1>Upload Track</h1>

      <input type="text" id="title" placeholder="Track Title">

      <textarea id="description" placeholder="Track Description"></textarea>

      <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,audio/*">

      <select id="license">
        <option>License Type</option>
        <option>Exclusive</option>
        <option>Non-exclusive</option>
        <option>Rent</option>
      </select>

      <input type="number" id="price" placeholder="Price ($)">

      <div class="tags-container">
        <input type="text" id="tagInput" placeholder="Add tags...">
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="selected-tags" id="selectedTags"></div>
      <div class="popular-tags" id="popularTags"></div>

      <button class="btn" onclick="upload()">Upload</button>

    </div>
  </div>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
